<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyClaw - Đăng Ký Thông Tin Hộ Kinh Doanh Agribank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/docx@7.1/build/index.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" fill="url(#gradient)"/>
                    <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#00D9FF"/>
                            <stop offset="100%" stop-color="#6366F1"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span>SkyClaw</span>
            </div>
            <p class="tagline">Đăng Ký Thông Tin Hộ Kinh Doanh - Agribank</p>
        </header>

        <main class="main-content">
            <form id="hoKinhDoanhForm" class="form-container">
                <div class="form-section">
                    <h2>I. Thông Tin Cơ Bản</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="tenChiNhanh">Chi nhánh Agribank <span class="required">*</span></label>
                            <input type="text" id="tenChiNhanh" name="tenChiNhanh" required placeholder="Agribank Chi nhánh...">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>II. Thông Tin Hộ Kinh Doanh</h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="tenHoKinhDoanh">Tên Hộ kinh doanh <span class="required">*</span></label>
                            <input type="text" id="tenHoKinhDoanh" name="tenHoKinhDoanh" required placeholder="Tên Hộ kinh doanh">
                        </div>
                        <div class="form-group">
                            <label for="soGiayPhepDkkd">Số giấy phép ĐKKD <span class="required">*</span></label>
                            <input type="text" id="soGiayPhepDkkd" name="soGiayPhepDkkd" required placeholder="Số ĐKKD">
                        </div>
                        <div class="form-group">
                            <label for="ngayCapDkkd">Ngày cấp ĐKKD <span class="required">*</span></label>
                            <input type="date" id="ngayCapDkkd" name="ngayCapDkkd" required>
                        </div>
                        <div class="form-group">
                            <label for="noiCapDkkd">Nơi cấp ĐKKD <span class="required">*</span></label>
                            <input type="text" id="noiCapDkkd" name="noiCapDkkd" required placeholder="Sở Kế hoạch và Đầu tư...">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>III. Thông Tin Chủ Hộ</h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="tenChuHo">Tên chủ hộ <span class="required">*</span></label>
                            <input type="text" id="tenChuHo" name="tenChuHo" required placeholder="Họ và tên chủ hộ">
                        </div>
                        <div class="form-group">
                            <label for="soCccd">Số CCCD <span class="required">*</span></label>
                            <input type="text" id="soCccd" name="soCccd" required placeholder="012345678901">
                        </div>
                        <div class="form-group">
                            <label for="ngayCapCccd">Ngày cấp CCCD <span class="required">*</span></label>
                            <input type="date" id="ngayCapCccd" name="ngayCapCccd" required>
                        </div>
                        <div class="form-group">
                            <label for="noiCapCccd">Nơi cấp CCCD <span class="required">*</span></label>
                            <input type="text" id="noiCapCccd" name="noiCapCccd" required placeholder="Công an...">
                        </div>
                        <div class="form-group">
                            <label for="ngayHetHanCccd">Ngày hết hạn CCCD <span class="required">*</span></label>
                            <input type="date" id="ngayHetHanCccd" name="ngayHetHanCccd" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>IV. Địa Chỉ</h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="diaChi">Địa chỉ <span class="required">*</span></label>
                            <input type="text" id="diaChi" name="diaChi" required placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>V. Thông Tin Liên Lạc</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="dienThoai">Điện thoại</label>
                            <input type="tel" id="dienThoai" name="dienThoai" placeholder="0912 345 678">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="email@example.com">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>VI. Xuất File</h2>
                    <div class="export-options">
                        <label class="export-option">
                            <input type="radio" name="exportFormat" value="pdf" checked>
                            <span class="option-card">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <line x1="16" y1="13" x2="8" y2="13"/>
                                    <line x1="16" y1="17" x2="8" y2="17"/>
                                </svg>
                                <span>PDF</span>
                            </span>
                        </label>
                        <label class="export-option">
                            <input type="radio" name="exportFormat" value="docx">
                            <span class="option-card">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <text x="8" y="17" font-size="6" fill="currentColor">DOCX</text>
                                </svg>
                                <span>DOCX</span>
                            </span>
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">Nhập Lại</button>
                    <button type="submit" class="btn btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Xuất File
                    </button>
                </div>
            </form>
        </main>

        <footer class="footer">
            <p>&copy; 2025 SkyClaw. Built with ❤️</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
